background {
	monitor =
		path = ~/.local/share/bg
		# color = rgb(B3D7F2)
}

input-field {
	size = 250, 50
	outline_thickness = 30
	dots_size = 0.33
	dots_spacing = 0.15
	dots_center = true
	outer_color = rgb(8B3AA9)
	inner_color = rgb(000006)
	font_color = rgb(015BFE)
	fade_on_empty = true
	placeholder_text = <i>Password...</i>
	hide_input = true
	position = 0, 200
	halign = center
	valign = bottom
}

# Date
label {
	text = cmd[update:18000000] echo "<b> "$(date +'%A, %-d %B %Y')" </b>"
	color = rgb(015BFE)
	font_size = 34
	position = 0, -150
	halign = center
	valign = top
}

# Week
label {
	text = cmd[update:18000000] echo "<b> "$(date +'Week %U')" </b>"
	color = rgb(8B3AA9)
	font_size = 24
	position = 0, -250
	halign = center
	valign = top
}

# Time
label {
	#text = cmd[update:1000] echo "<b><big> $(date +"%I:%M:%S %p") </big></b>" # AM/PM
	text = cmd[update:1000] echo "<b><big> $(date +"%H:%M:%S") </big></b>" # 24H
	color = rgb(B3D7F2)
	font_size = 94
	position = 0, 0
	halign = center
	valign = center
}

# User
label {
	text =    $USER
	color = rgb(015BFE)
	font_size = 18
	position = 0, 100
	halign = center
	valign = bottom
}

# uptime
label {
	text = cmd[update:60000] echo "<b> "$(uptime -p)" </b>"
	color = rgb(015BFE)
	font_size = 24
	position = 0, 0
	halign = right
	valign = bottom
}
